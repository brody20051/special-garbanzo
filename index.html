
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drag Strip Reaction Game</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/game.css">
</head>

<body>

    <div class="track"></div>

<header>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <span class="navbar-brand">🏁 Drag Reaction Game</span>
      <button id="resetBtn" class="btn btn-danger">Reset</button>
    </div>
  </nav>
</header>

<main class="container text-center mt-4 game-container">

  <h2 id="status">Click Start</h2>

  <!-- Drag Tree -->
  <div id="tree">
    <div class="light"></div>
    <div class="light"></div>
    <div class="light yellow"></div>
    <div class="light yellow"></div>
    <div class="light yellow"></div>
    <div class="light green"></div>
  </div>

  <!-- Controls -->
  <div class="mt-4">
    <button id="startBtn" class="btn btn-success">Start Race</button>
    <button id="launchBtn" class="btn btn-warning ms-2" disabled>LAUNCH</button>
  </div>

  <!-- Score -->
  <div class="mt-4">
    <p>Reaction Time: <span id="time">0.000</span> sec</p>
    <p>Best Time: <span id="best">--</span></p>
  </div>

</main>

<footer class="text-center mt-5">
  <p>Made by You 🚀</p>
</footer>

<script type="module" src="scripts/game.js"></script>

</body>
</html>

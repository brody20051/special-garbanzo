<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drag Reaction Game</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons (FOR GITHUB ICON) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/game.css">
</head>

<body>

<!-- Animated Track -->
<div class="track"></div>

<header>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <span class="navbar-brand">🏁 Drag Reaction Game</span>

      <div>
        <button class="btn btn-info me-2" data-bs-toggle="modal" data-bs-target="#howToModal">
          How to Play
        </button>
        <button id="resetBtn" class="btn btn-danger">Reset</button>
      </div>
    </div>
  </nav>
</header>

<main class="container text-center mt-4 game-container">

  <h2 id="status">Click Start</h2>

  <!-- Drag Tree -->
  <div id="tree"></div>

  <!-- Controls -->
  <div class="mt-4">
    <button id="startBtn" class="btn btn-success">Start Race</button>
    <button id="launchBtn" class="btn btn-warning ms-2" disabled>LAUNCH</button>
  </div>

  <!-- Score -->
  <div class="mt-4">
    <p aria-live="polite">Reaction Time: <span id="time">0.000</span> sec</p>
    <p>Best Time: <span id="best">--</span></p>
  </div>

  <!-- SETTINGS FORM -->
  <form id="settingsForm" class="mt-4">
    <h4>Settings</h4>

    <label for="playerName" class="form-label">Player Name</label>
    <input type="text" id="playerName" class="form-control mb-2"
      placeholder="Enter Name" required minlength="2">

    <label for="difficulty" class="form-label">Mode</label>
    <select id="difficulty" class="form-select mb-2" required>
      <option value="">Select Mode</option>
      <option value="sportsman">Sportsman Tree</option>
      <option value="pro">Pro Tree</option>
    </select>

    <button type="submit" class="btn btn-primary">Save Settings</button>
  </form>

</main>

<!-- MODAL -->
<div class="modal fade" id="howToModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5>How to Play</h5>
      </div>
      <div class="modal-body">
        <p>Wait for the green light, then press LAUNCH as fast as possible.</p>
        <p>Press too early = RED LIGHT!</p>
      </div>
    </div>
  </div>
</div>

<!-- ✅ FOOTER WITH YOUR GITHUB REPO -->
<footer class="text-center mt-5">
  <p>

    |

    <a href="https://github.com/brody20051/special-garbanzo" target="_blank">
      <i class="bi bi-github"></i> Game Repo
    </a> |

    <a href="https://github.com/brody20051" target="_blank">
      <i class="bi bi-github"></i> GitHub
    </a> |

    <a href="https://validator.w3.org/nu/?doc=YOUR_DEPLOYED_URL" target="_blank">
      HTML Validator
    </a> |

    <a href="https://wave.webaim.org/report#/YOUR_DEPLOYED_URL" target="_blank">
      WAVE
    </a>

  </p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script type="module" src="scripts/game.js"></script>

</body>
</html>
